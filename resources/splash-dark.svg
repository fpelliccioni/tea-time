<?xml version="1.0" encoding="UTF-8"?>
<!-- Splash en modo oscuro: misma composición, colores un pelín más contrastados. -->
<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
